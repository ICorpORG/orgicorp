name: terraformoctopus destroy

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  terraform-destroy:
    name: Octopus Destroy
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login to Octopus using GitHub OIDC
        id: octopus_login
        uses: OctopusDeploy/login@v2
        with:
          server: ${{ vars.OCTOPUS_URL }}
          service_account_id: ${{ vars.OCTOPUS_SERVICE_ACCOUNT_ID }}

      - name: Create Terraform OIDC vars file
        shell: powershell
        run: |
          $accessToken = "${{ steps.octopus_login.outputs.access_token }}"

          if ([string]::IsNullOrWhiteSpace($accessToken)) {
            throw "OctopusDeploy/login did not return an access_token output"
          }

          $octopusDir = Join-Path $env:GITHUB_WORKSPACE "octopus"

          if (!(Test-Path $octopusDir)) {
            throw "Terraform directory not found: $octopusDir"
          }

          $varsPath = Join-Path $octopusDir "oidc.auto.tfvars.json"

          $vars = @{
            OCTOPUS_URL = "${{ vars.OCTOPUS_URL }}"
            OCTOPUS_ACCESS_TOKEN = $accessToken
          }

          $vars | ConvertTo-Json -Depth 5 | Set-Content -Path $varsPath -Encoding UTF8

          if (!(Test-Path $varsPath)) {
            throw "Failed to create Terraform vars file: $varsPath"
          }

          Write-Host "Created Terraform vars file:"
          Write-Host $varsPath

          Write-Host "Files in Terraform directory:"
          Get-ChildItem $octopusDir | Select-Object Name, Length

      - name: Terraform Init
        shell: powershell
        working-directory: octopus
        run: terraform init -upgrade -reconfigure -input=false -no-color

      - name: Terraform Destroy
        shell: powershell
        working-directory: octopus
        run: terraform destroy -auto-approve -input=false -no-color -var-file="oidc.auto.tfvars.json"

      - name: Remove temporary Terraform vars file
        if: always()
        shell: powershell
        run: |
          $varsPath = Join-Path $env:GITHUB_WORKSPACE "octopus\oidc.auto.tfvars.json"

          if (Test-Path $varsPath) {
            Remove-Item $varsPath -Force
            Write-Host "Removed temporary Terraform vars file"
          }