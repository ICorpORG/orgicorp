name: terraformoctopus destroy

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  terraform-destroy:
    name: Octopus Destroy
    runs-on: self-hosted

    defaults:
      run:
        working-directory: octopus

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login to Octopus using GitHub OIDC
        id: octopus_login
        uses: OctopusDeploy/login@v2
        with:
          server: ${{ vars.OCTOPUS_URL }}
          service_account_id: ${{ vars.OCTOPUS_SERVICE_ACCOUNT_ID }}

      - name: Create temporary Terraform vars file
        shell: powershell
        run: |
          $accessToken = "${{ steps.octopus_login.outputs.access_token }}"

          if ([string]::IsNullOrWhiteSpace($accessToken)) {
            throw "OctopusDeploy/login did not return an access_token output"
          }

          $vars = @{
            OCTOPUS_URL = "${{ vars.OCTOPUS_URL }}"
            OCTOPUS_ACCESS_TOKEN = $accessToken
          }

          $vars | ConvertTo-Json | Set-Content -Path "oidc.auto.tfvars.json"

      - name: Terraform Init
        run: terraform init -upgrade -reconfigure -input=false -no-color

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false -no-color

      - name: Remove temporary Terraform vars file
        if: always()
        shell: powershell
        run: |
          if (Test-Path "oidc.auto.tfvars.json") {
            Remove-Item "oidc.auto.tfvars.json" -Force
          }