name: terraformoctopus destroy

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  terraform-destroy:
    name: Octopus Destroy
    runs-on: self-hosted

    defaults:
      run:
        working-directory: octopus
        shell: powershell

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show workflow and Terraform files
        shell: powershell
        working-directory: .
        run: |
          Write-Host "Workspace: $env:GITHUB_WORKSPACE"
          Write-Host "Ref: $env:GITHUB_REF"
          Write-Host "SHA: $env:GITHUB_SHA"

          Write-Host "Workflow files:"
          Get-ChildItem ".github\workflows" | Select-Object Name, FullName

          Write-Host "Terraform files:"
          Get-ChildItem "octopus" | Select-Object Name, FullName

      - name: Login to Octopus using GitHub OIDC
        id: octopus_login
        uses: OctopusDeploy/login@v1
        with:
          server: ${{ vars.OCTOPUS_URL }}
          service_account_id: ${{ vars.OCTOPUS_SERVICE_ACCOUNT_ID }}

      - name: Export Terraform variables
        shell: powershell
        working-directory: .
        run: |
          $accessToken = '${{ steps.octopus_login.outputs.access_token }}'

          if ([string]::IsNullOrWhiteSpace($accessToken)) {
            throw "OctopusDeploy/login did not return an access_token output"
          }

          "TF_VAR_OCTOPUS_URL=${{ vars.OCTOPUS_URL }}" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "TF_VAR_OCTOPUS_ACCESS_TOKEN=$accessToken" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          Write-Host "Exported TF_VAR_OCTOPUS_URL"
          Write-Host "Exported TF_VAR_OCTOPUS_ACCESS_TOKEN"

