name: terraformoctopus destroy

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  terraform-destroy:
    name: Octopus Destroy
    runs-on: self-hosted

    env:
      TF_VAR_OCTOPUS_URL: ${{ vars.OCTOPUS_URL }}

    defaults:
      run:
        working-directory: octopus

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login to Octopus using GitHub OIDC
        id: login_to_octopus
        uses: OctopusDeploy/login@v2
        with:
          server: ${{ vars.OCTOPUS_URL }}
          service_account_id: ${{ vars.OCTOPUS_SERVICE_ACCOUNT_ID }}

      - name: Check login output exists
        shell: powershell
        run: |
          if ([string]::IsNullOrWhiteSpace("${{ steps.login_to_octopus.outputs.access_token }}")) {
            throw "OctopusDeploy/login did not return access_token"
          }
          Write-Host "Octopus access token was returned"

      - name: Terraform Init
        env:
          TF_VAR_OCTOPUS_ACCESS_TOKEN: ${{ steps.login_to_octopus.outputs.access_token }}
        run: terraform init -reconfigure -input=false -no-color

      - name: Terraform Destroy
        env:
          TF_VAR_OCTOPUS_ACCESS_TOKEN: ${{ steps.login_to_octopus.outputs.access_token }}
        run: terraform destroy -auto-approve -input=false -no-color