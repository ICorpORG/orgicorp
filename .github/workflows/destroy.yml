name: terraformoctopus destroy

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  terraform-destroy:
    name: Octopus Destroy
    runs-on: self-hosted

    env:
      TF_VAR_OCTOPUS_URL: ${{ vars.OCTOPUS_URL }}

    defaults:
      run:
        working-directory: octopus

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login to Octopus using GitHub OIDC
        uses: OctopusDeploy/login@v2
        with:
          server: ${{ vars.OCTOPUS_URL }}
          service_account_id: ${{ vars.OCTOPUS_SERVICE_ACCOUNT_ID }}

      - name: Confirm Octopus token environment exists
        shell: powershell
        run: |
          if ([string]::IsNullOrWhiteSpace($env:OCTOPUS_ACCESS_TOKEN)) {
            throw "OCTOPUS_ACCESS_TOKEN was not set by OctopusDeploy/login"
          }
          Write-Host "OCTOPUS_ACCESS_TOKEN is present"

      - name: Terraform Init
        run: terraform init -upgrade -reconfigure -input=false -no-color

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false -no-color