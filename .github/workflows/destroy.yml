# This is a basic workflow to help you get started with Actions

name: terraformoctopus destroy

on: 
  workflow_dispatch:


jobs:
  terraform-destroy:
    name: Octopus Destroy
    runs-on: self-hosted
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: octopus

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login to Octopus using GitHub OIDC
        id: octopus_login
        uses: OctopusDeploy/login@v1
        with:
          server: "http://winsrv-oct1.icorp2.local:8080"
          service_account_id: "b79974ee-4f51-4fa0-aa12-39d6f40dd709"

#      - name: Login to Octopus using GitHub OIDC
#        id: octopus_login
#        uses: OctopusDeploy/login@v1
#        with:
#          server: ${{ vars.OCTOPUS_URL }}
#          service_account_id: ${{ vars.OCTOPUS_SERVICE_ACCOUNT_ID }}

      - name: Set Terraform environment
        shell: pwsh
        run: |
          "TF_VAR_OCTOPUS_URL=${{ steps.octopus_login.outputs.server }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "TF_VAR_OCTOPUS_ACCESS_TOKEN=${{ steps.octopus_login.outputs.access_token }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Terraform Init
        run: |
          terraform init -reconfigure -no-color

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -no-color