name: terraformoctopus destroy

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  terraform-destroy:
    name: Octopus Destroy
    runs-on: self-hosted

    env:
      TF_VAR_OCTOPUS_URL: ${{ vars.OCTOPUS_URL }}

    defaults:
      run:
        working-directory: octopus

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login to Octopus using GitHub OIDC
        id: octopus_login
        uses: OctopusDeploy/login@v2
        with:
          server: ${{ vars.OCTOPUS_URL }}
          service_account_id: ${{ vars.OCTOPUS_SERVICE_ACCOUNT_ID }}

      - name: Confirm Octopus token output exists
        shell: powershell
        run: |
          if ([string]::IsNullOrWhiteSpace("${{ steps.octopus_login.outputs.access_token }}")) {
            throw "OctopusDeploy/login did not return an access_token output"
          }
          Write-Host "Octopus access token output exists"

      - name: Terraform Init
        run: terraform init -upgrade -reconfigure -input=false -no-color

      - name: Terraform Destroy
        shell: powershell
        run: |
          terraform destroy `
            -auto-approve `
            -input=false `
            -no-color `
            -var "OCTOPUS_ACCESS_TOKEN=${{ steps.octopus_login.outputs.access_token }}"